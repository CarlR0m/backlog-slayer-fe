<div class="card border-0 shadow-sm">

  <h1 class="text-center pt-4 mb-0">Otros Juegos</h1>

  <div class="card-body pb-2">
    <div class="d-flex flex-wrap gap-3 justify-content-center game-grid">
      @for (game of games(); track game.id) {
      <div class="game-item">

        <!-- Titulo del juego -->
        <p class="text-center fw-semibold mb-1 game-title" [title]="game.title">
          {{ game.title }}
        </p>

        <div class="card shadow-sm overflow-hidden">
          <!-- Imagen del juego -->
          <img [src]="game.img" [alt]="game.title" class="card-img-top game-cover"
            (error)="$any($event.target).src='https://placehold.co/200x300?text=' + game.title" />

          <!-- Informacion del juego -->
          <div class="game-info d-flex flex-column gap-1 p-2">
            <small class="text-muted">
              <strong>Plataformas:</strong>
              {{ game.platforms.map(p => p.name).join(', ') }}
            </small>
            <small class="text-muted">
              <strong>Tiempo:</strong> {{ game.tiempojugado }}
            </small>
            <small class="text-muted">
              <strong>Puntuación:</strong> {{ game.score }}
            </small>
            <a [href]="game.store_url" target="_blank" rel="noopener noreferrer"
              class="btn btn-primary btn-sm mt-1 w-100">
              Jugar
            </a>
          </div>

        </div>
      </div>
      }
    </div>
  </div>

  <!-- Botones de acciones -->
  <div class="d-flex justify-content-between align-items-center px-4 py-3 border-top">
    <button type="button" class="btn btn-link btn-sm text-muted p-0 text-decoration-none" (click)="goDetail.emit()">
      Ver el juego elegido
    </button>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="goSurvey.emit()">
      Volver a la encuesta
    </button>
  </div>

</div>
