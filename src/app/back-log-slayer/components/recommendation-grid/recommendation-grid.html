<div class="rec-grid-card">

  <h1 class="rec-grid-heading text-center">Otras recomendaciones</h1>
  <div class="rec-grid-divider"></div>

  <div class="rec-games-grid">
    @for (game of games(); track game.id) {
      <div class="rec-game-item">
        <div class="rec-game-cover-wrapper">
          <img [src]="game.img" [alt]="game.title" class="rec-game-cover"
            (error)="$any($event.target).src='https://placehold.co/200x300?text=' + game.title" />
          <div class="rec-game-overlay">
            <a [href]="game.store_url" target="_blank" rel="noopener noreferrer" class="rec-game-play-btn">
              <i class="bi bi-steam me-1"></i>Jugar
            </a>
          </div>
        </div>
        <div class="rec-game-info">
          <p class="rec-game-title" [title]="game.title">{{ game.title }}</p>
          <div class="rec-game-meta">
            <span class="rec-meta-label">Plataformas:</span>
            <span class="rec-meta-value">{{ game.platforms.map(p => p.name).join(', ') }}</span>
          </div>
          <div class="rec-game-meta">
            <span class="rec-meta-label">Tiempo:</span>
            <span class="rec-meta-value">{{ game.tiempojugado }}</span>
          </div>
          <div class="rec-game-meta">
            <span class="rec-meta-label">Puntuación:</span>
            <span class="rec-meta-value">{{ game.score }}</span>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="rec-grid-footer">
    <button type="button" class="rec-back-btn" (click)="goDetail.emit()">
      <i class="bi bi-arrow-left me-1"></i>Ver el juego elegido
    </button>
    <button type="button" class="rec-survey-btn" (click)="goSurvey.emit()">
      Nueva encuesta
    </button>
  </div>

</div>
