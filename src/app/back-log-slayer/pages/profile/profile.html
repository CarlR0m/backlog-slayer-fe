<div class="profile-container">
  
  <!-- ROW 1: HEADER -->
  <header class="header">
    <ng-container *ngIf="profile$ | async as profile; else noProfile">
      <img class="avatar" [src]="profile.avatar" [alt]="profile.name" />
      <div class="user-info">
        <h2 class="username">{{ profile.name }}</h2>
        <div class="tags">
          <span class="tag" *ngFor="let tag of profile.tags">{{ tag }}</span>
        </div>
      </div>
    </ng-container>
    <ng-template #noProfile>
      <div class="no-data-placeholder">
        <p>Inicia sesión para ver tu perfil</p>
      </div>
    </ng-template>
  </header>

  <!-- ROW 2: MAIN CONTENT -->
  <main class="content">
    
    <!-- LEFT COLUMN: Most Played Game -->
    <div class="left">
      <h3 class="column-title">Juego Principal</h3>
      <ng-container *ngIf="profile$ | async as profile">
        <img class="main-game" [src]="profile.mostPlayedGame.image" [alt]="profile.mostPlayedGame.title" />
        <p class="game-title">{{ profile.mostPlayedGame.title }}</p>
      </ng-container>
      <ng-container *ngIf="(profile$ | async) === null">
        <div class="no-data-placeholder">
          <p>No hay datos del juego principal</p>
        </div>
      </ng-container>
    </div>

    <!-- CENTER COLUMN: Recommended Games -->
    <div class="center">
      <h3 class="column-title">Juegos Recomendados</h3>
      <ng-container *ngIf="profile$ | async as profile">
        <div class="recommended-item" *ngFor="let game of profile.recommendedGames">
          <img [src]="game.image" [alt]="game.title" />
          <span>{{ game.title }}</span>
        </div>
      </ng-container>
      <ng-container *ngIf="(profile$ | async) === null">
        <div class="no-data-placeholder">
          <p>No hay juegos recomendados</p>
        </div>
      </ng-container>
    </div>

    <!-- RIGHT COLUMN: Chart + Button -->
    <div class="right">
      <h3 class="column-title">Estadísticas</h3>
      <div class="chart-placeholder">
        <span>Chart coming soon</span>
      </div>
      <button class="library-btn">Mi biblioteca</button>
    </div>

  </main>

</div>
