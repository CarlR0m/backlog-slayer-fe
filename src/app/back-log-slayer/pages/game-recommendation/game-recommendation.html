<div class="rec-page-wrapper flex-grow-1 d-flex align-items-center justify-content-center py-5 px-3">

  @switch (pageState()) {

    @case ('ready') {
      <div class="mx-auto rec-content-wrapper">
        <app-recommendation-card
          [game]="game()!"
          (goOtherGames)="goToOtherGames()"
          (goSurvey)="goToSurvey()"
        />
      </div>
    }

    @case ('error') {
      <div class="mx-auto rec-content-wrapper">
        <div class="rec-error-card text-center">
          <i class="bi bi-controller rec-error-icon mb-4 d-block"></i>
          <h2 class="rec-error-title mb-2">No hay recomendación disponible</h2>
          <p class="rec-error-text mb-4">
            No encontramos ningún juego recomendado o los datos no son válidos.<br>
            Vuelve a responder la encuesta para obtener tu próxima recomendación.
          </p>
          <button type="button" class="rec-survey-btn" (click)="goToSurvey()">
            Ir a la encuesta
          </button>
        </div>
      </div>
    }

  }

</div>
