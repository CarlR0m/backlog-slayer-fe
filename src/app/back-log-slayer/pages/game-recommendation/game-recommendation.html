<div class="container py-4">

  @switch (pageState()) {

    @case ('ready') {
      <div class="mx-auto content-wrapper">
        <app-recommendation-card
          [game]="game()!"
          (goOtherGames)="goToOtherGames()"
          (goSurvey)="goToSurvey()"
        />
      </div>
    }

    @case ('error') {
      <div class="mx-auto content-wrapper">
        <div class="card border-0 shadow-sm text-center py-5 px-4">
          <i class="bi bi-controller display-3 text-muted mb-3"></i>
          <h2 class="h4 mb-2">No hay recomendación disponible</h2>
          <p class="text-muted mb-4">
            No encontramos ningún juego recomendado o los datos no son válidos.
            Vuelve a responder la encuesta para obtener tu próxima recomendación.
          </p>
          <div>
            <button type="button" class="btn btn-primary px-4" (click)="goToSurvey()">
              Ir a la encuesta
            </button>
          </div>
        </div>
      </div>
    }

  }

</div>
