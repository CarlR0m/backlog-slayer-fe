<div class="other-page-wrapper flex-grow-1 d-flex align-items-start justify-content-center py-5 px-3">

  @switch (pageState()) {

    @case ('ready') {
      <div class="mx-auto other-content-wrapper">
        <app-recommendation-grid
          [games]="games()"
          (goDetail)="goToGameDetail()"
          (goSurvey)="goToSurvey()"
        />
      </div>
    }

    @case ('error') {
      <div class="mx-auto other-content-wrapper d-flex align-items-center" style="min-height: 60vh;">
        <div class="rec-error-card text-center w-100">
          <i class="bi bi-controller rec-error-icon mb-4 d-block"></i>
          <h2 class="rec-error-title mb-2">No hay otras recomendaciones disponibles</h2>
          <p class="rec-error-text mb-4">
            No encontramos juegos adicionales recomendados o los datos no son válidos.<br>
            Vuelve a responder la encuesta o consulta el juego principal recomendado.
          </p>
          <div class="d-flex justify-content-center gap-3">
            <button type="button" class="rec-outline-btn" (click)="goToGameDetail()">
              <i class="bi bi-arrow-left me-1"></i>Ver juego principal
            </button>
            <button type="button" class="rec-survey-btn" (click)="goToSurvey()">
              Nueva encuesta
            </button>
          </div>
        </div>
      </div>
    }

  }

</div>
