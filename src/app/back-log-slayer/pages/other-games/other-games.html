<div class="container py-4">

  @switch (pageState()) {

    @case ('ready') {
      <div class="mx-auto content-wrapper">
        <app-recommendation-grid
          [games]="games()"
          (goDetail)="goToGameDetail()"
          (goSurvey)="goToSurvey()"
        />
      </div>
    }

    @case ('error') {
      <div class="mx-auto content-wrapper">
        <div class="card border-0 shadow-sm text-center py-5 px-4">
          <i class="bi bi-controller display-3 text-muted mb-3"></i>
          <h2 class="h4 mb-2">No hay otras recomendaciones disponibles</h2>
          <p class="text-muted mb-4">
            No encontramos juegos adicionales recomendados o los datos no son válidos.
            Vuelve a responder la encuesta o consulta el juego principal recomendado.
          </p>
          <div class="d-flex justify-content-center gap-2">
            <button type="button" class="btn btn-outline-secondary px-4" (click)="goToGameDetail()">
              Ver juego principal
            </button>
            <button type="button" class="btn btn-primary px-4" (click)="goToSurvey()">
              Ir a la encuesta
            </button>
          </div>
        </div>
      </div>
    }

  }

</div>
