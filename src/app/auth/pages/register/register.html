<div class="d-flex flex-column h-100 justify-content-center px-2">
  <h2 class="fw-bold border-bottom border-dark pb-2 mb-4">
    Registro
  </h2>
  <form>
    <div class="mb-3">
      <label for="register-username" class="form-label fw-semibold">Nombre de usuario</label>
      <input id="register-username" type="text" class="form-control" placeholder="Nombre de usuario..." />
    </div>

    <div class="mb-3">
      <label for="register-email" class="form-label fw-semibold">Correo electrónico</label>
      <input id="register-email" type="email" class="form-control" placeholder="example@example.es..." />
    </div>

    <div class="mb-3">
      <label for="register-password" class="form-label fw-semibold">Contraseña</label>
      <input id="register-password" type="password" class="form-control" placeholder="············" />
    </div>

    <div class="mb-4">
      <label for="register-password-confirm" class="form-label fw-semibold">
        Introducir de nuevo contraseña
      </label>
      <input id="register-password-confirm" type="password" class="form-control" placeholder="············" />
    </div>

    <div class="d-flex align-items-center justify-content-between">

      <button type="submit" class="btn btn-outline-dark fw-bold text-uppercase px-3 py-2">
        Iniciar sesión
      </button>

      <a routerLink="/" class="text-dark text-decoration-underline small">
        Continuar sin iniciar sesión
      </a>

    </div>

  </form>
</div>
